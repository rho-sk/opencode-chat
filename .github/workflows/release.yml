name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: node build/esbuild.mjs

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update versions.json
        run: |
          VERSION=${{ steps.version.outputs.version }}
          MIN_APP=$(node -e "process.stdout.write(require('./src/manifest.json').minAppVersion)")
          node -e "
            const fs = require('fs');
            const v = JSON.parse(fs.readFileSync('versions.json', 'utf8'));
            v['${VERSION}'] = '${MIN_APP}';
            fs.writeFileSync('versions.json', JSON.stringify(v, null, 2) + '\n');
          "

      - name: Commit versions.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git diff --staged --quiet || git commit -m "chore: update versions.json for v${{ steps.version.outputs.version }}"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Create release ZIP
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p /tmp/opencode-chat
          cp build/dist/main.js     /tmp/opencode-chat/main.js
          cp src/styles.css         /tmp/opencode-chat/styles.css
          cp src/manifest.json      /tmp/opencode-chat/manifest.json
          cd /tmp && zip -r opencode-chat-v${VERSION}.zip opencode-chat/
          mv /tmp/opencode-chat-v${VERSION}.zip $GITHUB_WORKSPACE/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            build/dist/main.js
            src/manifest.json
            src/styles.css
            opencode-chat-v${{ steps.version.outputs.version }}.zip
